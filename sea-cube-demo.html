<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Seascape Cube - Environment & Transparency</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050b14;
            font-family: sans-serif;
        }

        canvas {
            display: block;
        }

        #gui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(5, 11, 20, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1f2937;
            color: #e5e7eb;
            width: 260px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            user-select: none;
            z-index: 10;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            color: #9ca3af;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        .value-display {
            font-family: monospace;
            font-size: 12px;
            min-width: 35px;
            text-align: right;
        }
    </style>
</head>

<body>

    <div id="gui-container">
        <div class="control-group">
            <label for="height-slider">Výška vln (Height)</label>
            <div class="slider-wrapper">
                <input type="range" id="height-slider" min="0.0" max="1" step="0.0005" value="0.025">
                <span id="height-val" class="value-display">0.025</span>
            </div>
        </div>
        <div class="control-group">
            <label for="speed-slider">Rychlost (Speed)</label>
            <div class="slider-wrapper">
                <input type="range" id="speed-slider" min="0.0" max="10.0" step="0.1" value="0.8">
                <span id="speed-val" class="value-display">0.8</span>
            </div>
        </div>
        <div class="control-group">
            <label for="freq-slider">Frekvence (Freq)</label>
            <div class="slider-wrapper">
                <input type="range" id="freq-slider" min="1.0" max="100.0" step="0.1" value="4.0">
                <span id="freq-val" class="value-display">4.0</span>
            </div>
        </div>
        <div class="control-group">
            <label for="choppy-slider">Ostrost (Choppy)</label>
            <div class="slider-wrapper">
                <input type="range" id="choppy-slider" min="0.0" max="20.0" step="0.1" value="4.0">
                <span id="choppy-val" class="value-display">4.0</span>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#050b14');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(1.8, 1.5, 1.8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const vertexShader = `
            uniform float iTime;
            uniform float uSeaHeight;
            uniform float uSeaChoppy;
            uniform float uSeaSpeed;
            uniform float uSeaFreq;

            varying vec3 vNormal;
            varying vec3 vPosition;
            varying vec3 vLocalPos;
            varying vec3 vWorldPos;
            varying vec3 vI; // Vektor od kamery k vertexu ve world space

            const int ITER_GEOMETRY = 3;
            
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

            float snoise(vec3 v){
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 =   v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + 1.0 * C.xxx;
                vec3 x2 = x0 - i2 + 2.0 * C.xxx;
                vec3 x3 = x0 - D.yyy;
                i = mod(i, 289.0 );
                vec4 p = permute( permute( permute(
                            i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                        + i.y + vec4(0.0, i1.y, i2.y, 1.0 ))
                        + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 0.142857142857;
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z *ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            float sea_octave3D(vec3 p, float choppy) {
                p += snoise(p);
                vec3 wv = 1.0 - abs(sin(p));
                vec3 swv = abs(cos(p));
                wv = mix(wv, swv, wv);
                return pow(1.0 - pow(wv.x * wv.y * wv.z, 0.5), choppy);
            }

            float getWaveHeight(vec3 p) {
                vec3 sphereProj = normalize(p);
                float freq = uSeaFreq;
                float amp = uSeaHeight;
                float choppy = uSeaChoppy;
                float seaTime = iTime * uSeaSpeed;
                
                float h = 0.0;    
                for(int i = 0; i < ITER_GEOMETRY; i++) {        
                    h += sea_octave3D((sphereProj * freq) + vec3(0.0, seaTime, 0.0), choppy) * amp;
                    h += sea_octave3D((sphereProj * freq) - vec3(seaTime, 0.0, seaTime), choppy) * amp;
                    freq *= 2.0; 
                    amp *= 0.18;
                    choppy = mix(choppy, 1.0, 0.2);
                }
                return h;
            }

            void main() {
                vLocalPos = position;

                float wave = getWaveHeight(position);
                vec3 displaceDir = normalize(position);
                vec3 newPosition = position + displaceDir * wave;

                // Dynamický dopočet normál
                float eps = 0.003;
                vec3 tangent = (abs(displaceDir.y) > 0.99) ? vec3(1.0, 0.0, 0.0) : cross(displaceDir, vec3(0.0, 1.0, 0.0));
                tangent = normalize(tangent);
                vec3 bitangent = normalize(cross(displaceDir, tangent));

                vec3 pX = position + tangent * eps;
                vec3 pY = position + bitangent * eps;
                pX += normalize(pX) * getWaveHeight(pX);
                pY += normalize(pY) * getWaveHeight(pY);
                vec3 modifiedNormal = normalize(cross(pX - newPosition, pY - newPosition));

                // Transformace do world space pro environment mapu
                vec4 worldPos = modelMatrix * vec4(newPosition, 1.0);
                vWorldPos = worldPos.xyz;
                vNormal = normalize(mat3(modelMatrix) * modifiedNormal);
                vI = worldPos.xyz - cameraPosition;

                gl_Position = projectionMatrix * viewMatrix * worldPos;
            }
        `;

        const fragmentShader = `
            uniform float iTime;
            uniform samplerCube tCube; // Textura prostředí předaná z Three.js

            varying vec3 vNormal;
            varying vec3 vLocalPos;
            varying vec3 vWorldPos;
            varying vec3 vI;

            const vec3 WATER_COLOR = vec3(0.0, 0.4, 0.5); // Barva hluboké vody uvnitř
            const vec3 WATER_TINT = vec3(0.7, 0.95, 0.9); // Nádech na hranách

            void main() {
                vec3 N = normalize(vNormal);
                vec3 I = normalize(vI);

                // Index lomu světla (voda = ~1.333)
                float ior = 1.333; 
                float eta = 1.0 / ior;

                // 1. Refrakce (lom světla skrz kostku)
                vec3 R_refract = refract(I, N, eta);
                vec3 refractedColor = textureCube(tCube, R_refract).rgb;

                // 2. Reflexe (odraz okolí na hladině)
                vec3 R_reflect = reflect(I, N);
                vec3 reflectedColor = textureCube(tCube, R_reflect).rgb;

                // 3. Fresnelův efekt (pod úhlem vidíme víc odrazů, kolmo vidíme skrz)
                float fresnel = pow(1.0 - max(dot(-I, N), 0.0), 4.0);
                fresnel = clamp(fresnel, 0.0, 1.0);

                // Smíchání lomu a odrazu na povrchu
                vec3 surfaceColor = mix(refractedColor, reflectedColor, fresnel);

                // 4. Simulace absorpce světla vodou (průhlednost)
                // Čím více se díváme skrz silnou vrstvu/střed, tím více barvíme do WATER_COLOR
                float depthFactor = 1.0 - max(dot(-I, N), 0.0);
                vec3 finalColor = mix(surfaceColor * WATER_TINT, WATER_COLOR, depthFactor * 0.4);

                // Přidáme jemný odlesk přímého světla (Specular highlight)
                vec3 lightDir = normalize(vec3(5.0, 10.0, 7.0));
                vec3 H = normalize(lightDir - I);
                float spec = pow(max(dot(N, H), 0.0), 128.0);
                finalColor += vec3(spec * 0.8);

                // Nastavení alfy pro lehkou celkovou průhlednost kostky vůči objektům úplně za ní
                gl_FragColor = vec4(finalColor, 0.85);
            }
        `;

        const loader = new THREE.CubeTextureLoader();

        const environmentTexture = loader.load([
            './assets/textures/sky/cubemap_0.png',
            './assets/textures/sky/cubemap_1.png',
            './assets/textures/sky/cubemap_2.png',
            './assets/textures/sky/cubemap_3.png',
            './assets/textures/sky/cubemap_4.png',
            './assets/textures/sky/cubemap_5.png'
        ]);

        scene.background = environmentTexture;
        scene.environment = environmentTexture;

        const customUniforms = {
            iTime: { value: 0 },
            uSeaHeight: { value: 0.025 },
            uSeaChoppy: { value: 4.0 },
            uSeaSpeed: { value: 0.8 },
            uSeaFreq: { value: 4.0 },
            tCube: { value: environmentTexture }
        };
        
        const sliders = {
            'height-slider': { uniform: 'uSeaHeight', display: 'height-val' },
            'speed-slider': { uniform: 'uSeaSpeed', display: 'speed-val' },
            'freq-slider': { uniform: 'uSeaFreq', display: 'freq-val' },
            'choppy-slider': { uniform: 'uSeaChoppy', display: 'choppy-val' }
        };

        Object.keys(sliders).forEach(id => {
            const sliderEl = document.getElementById(id);
            const displayEl = document.getElementById(sliders[id].display);

            sliderEl.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                displayEl.textContent = val;
                customUniforms[sliders[id].uniform].value = val;
            });
        });

        document.getElementById('gui-container').addEventListener('pointerdown', (e) => {
            e.stopPropagation();
        });

        const material = new THREE.ShaderMaterial({
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            uniforms: customUniforms,
            transparent: true,
            side: THREE.DoubleSide
        });

        const geometry = new THREE.BoxGeometry(1, 1, 1, 96, 96, 96);
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        const ambientLight = new THREE.AmbientLight(0xffffff, 2);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 15);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            customUniforms.iTime.value = elapsedTime;

            cube.rotation.x = elapsedTime * 0.05;
            cube.rotation.y = elapsedTime * 0.03;

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });

        animate();
    </script>
</body>

</html>
